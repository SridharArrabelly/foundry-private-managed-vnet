#  yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: foundry-private-managed-vnet
metadata:
  template: foundry-private-managed-vnet@0.0.1
infra:
  provider: bicep
  path: infra
  module: main
hooks:
  postprovision:
    windows:
      shell: pwsh
      run: ./scripts/postprovision.ps1
      continueOnError: false
      interactive: true
    posix:
      shell: sh
      run: ./scripts/postprovision.sh
      continueOnError: false
      interactive: true
